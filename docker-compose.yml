services:
  dnscrypt-proxy:
    container_name: dnscrypt-proxy
    image: klutchell/dnscrypt-proxy:latest
    volumes:
      - ./config:/config
    networks:
      pihole_network:
        aliases:
          - dnscrypt-proxy
    restart: unless-stopped

  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - "${LOOPBACK_IP:-127.0.0.2}:53:53/tcp"
      - "${LOOPBACK_IP:-127.0.0.2}:53:53/udp"
      - "${LOOPBACK_IP:-127.0.0.2}:80:80/tcp"
    environment:
      TZ: ${TZ:-America/Chicago}
      WEBPASSWORD: ${WEBPASSWORD:-changeme}
      FTLCONF_dns_upstreams: 'dnscrypt-proxy#5053'
      FTLCONF_dns_listeningMode: 'all'
    volumes:
      - './pihole-data/etc-pihole:/etc/pihole'
      - './pihole-data/etc-dnsmasq.d:/etc/dnsmasq.d'
    networks:
      - pihole_network
    depends_on:
      - dnscrypt-proxy
    restart: unless-stopped

networks:
  pihole_network:
    name: pihole_network
